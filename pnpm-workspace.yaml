# applesauce-relay tracks a `0.0.0-next-*` prerelease (native multi-signer
# NIP-42 auth) that is newer than pnpm's minimumReleaseAge safety cutoff.
# Exclude just that package from the age check so `pnpm install`/`pnpm dev`
# don't reject the freshly-published version; the policy still applies to every
# other dependency.
minimumReleaseAgeExclude:
  - nostr-idb@5.1.0
  - applesauce-accounts@0.0.0-concord-20260710195315
  - applesauce-actions@0.0.0-concord-20260710195315
  - applesauce-common@0.0.0-concord-20260710195315
  - applesauce-concord@0.0.0-concord-20260710195315
  - applesauce-content@0.0.0-concord-20260710195315
  - applesauce-core@0.0.0-concord-20260710195315
  - applesauce-loaders@0.0.0-concord-20260710195315
  - applesauce-react@0.0.0-concord-20260710195315
  - applesauce-relay@0.0.0-concord-20260710195315
  - applesauce-signers@0.0.0-concord-20260710195315

allowBuilds:
  esbuild: true
