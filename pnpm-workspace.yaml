# applesauce-relay tracks a `0.0.0-next-*` prerelease (native multi-signer
# NIP-42 auth) that is newer than pnpm's minimumReleaseAge safety cutoff.
# Exclude just that package from the age check so `pnpm install`/`pnpm dev`
# don't reject the freshly-published version; the policy still applies to every
# other dependency.
minimumReleaseAgeExclude:
  - applesauce-relay
  - nostr-idb@5.1.0

allowBuilds:
  esbuild: true

overrides:
  applesauce-accounts: link:../applesauce/packages/accounts
  applesauce-actions: link:../applesauce/packages/actions
  applesauce-common: link:../applesauce/packages/common
  applesauce-concord: link:../applesauce/packages/concord
  applesauce-content: link:../applesauce/packages/content
  applesauce-core: link:../applesauce/packages/core
  applesauce-extra: link:../applesauce/packages/extra
  applesauce-loaders: link:../applesauce/packages/loaders
  applesauce-react: link:../applesauce/packages/react
  applesauce-relay: link:../applesauce/packages/relay
  applesauce-signers: link:../applesauce/packages/signers
  applesauce-sqlite: link:../applesauce/packages/sqlite
  applesauce-wallet: link:../applesauce/packages/wallet
  applesauce-wallet-connect: link:../applesauce/packages/wallet-connect
