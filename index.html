<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="description" content="A Discord-style, end-to-end encrypted Concord community client over Nostr." />
    <title>Accordion</title>
    <!-- Apply the saved theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var fallback = {
            mode: "system",
            light: { type: "daisy", name: "light" },
            dark: { type: "daisy", name: "dark" },
          };
          var raw = localStorage.getItem("accordion:appearance");
          var config = raw ? JSON.parse(raw) : fallback;
          var old = localStorage.getItem("accordion:theme");
          if (!raw && (old === "light" || old === "dark")) config = Object.assign({}, fallback, { mode: old });
          var slot = config.mode === "system"
            ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : config.mode;
          var choice = config[slot] || fallback[slot];
          var root = document.documentElement;
          if (choice && choice.type === "nostr" && choice.variables) {
            root.setAttribute("data-theme", "accordion-runtime");
            Object.keys(choice.variables).forEach(function (name) {
              root.style.setProperty(name, choice.variables[name]);
            });
          } else {
            root.setAttribute("data-theme", (choice && choice.name) || slot);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
