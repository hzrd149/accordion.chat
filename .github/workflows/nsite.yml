name: Deploy nsite
on:
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  group: "nsite"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      # Pushes to master deploy to the "next" build channel for testing
      - name: Deploy next version
        uses: sandwichfarm/nsite-action@v0.5.1
        with:
          nbunksec: ${{ secrets.NSITE_BUNKER }}
          directory: "./dist"
